<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 &mdash; Page Not Found</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --green: #3fb950;
      --red: #f85149;
      --text: #e6edf3;
      --muted: #8b949e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }

    .code {
      font-family: 'Courier New', monospace;
      font-size: 5rem;
      font-weight: 700;
      color: var(--red);
      line-height: 1;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-block;
      background: var(--green);
      color: #0d1117;
      font-size: 0.95rem;
      font-weight: 700;
      padding: 11px 30px;
      border-radius: 8px;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }

    .hint {
      margin-top: 48px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 24px;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .hint span { color: var(--red); }
  </style>
</head>
<body>

  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>That URL doesn't exist. Head back and try again.</p>

  <a href="/IDE/" class="btn">Back to the IDE &rarr;</a>

  <div class="hint">
    <span>ERROR</span> &mdash; {{ request_path }} was not found on this server
  </div>

</body>
</html>
